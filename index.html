<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiftLog">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<title>LiftLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#080808;--bg2:#0d0d0d;--bg3:#111;--bg4:#161616;--border:#1e1e1e;--border2:#2a2a2a;--text:#e2e2da;--text2:#aaa;--text3:#666;--text4:#444;--green:#4ade80;--yellow:#facc15;--red:#ef4444;--back:#4ade80;--chest:#60a5fa;--shoulders:#f97316;--arms:#e879f9;--legs:#facc15;--core:#fb7185;--other:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden}
button,input,select,textarea{font-family:'DM Mono',monospace}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;line-height:1}
.logo span{color:var(--green)}
.date-wrap{display:flex;align-items:center;gap:8px}
#date-input{background:#141414;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;padding:5px 8px;border-radius:3px;outline:none}
#date-input:focus{border-color:var(--green)}
#saved-flash{font-size:11px;color:var(--green);letter-spacing:1px;opacity:0;transition:opacity .2s}
#saved-flash.show{opacity:1}
.progress-row{display:flex;align-items:center;gap:8px}
#prog-label{font-size:10px;letter-spacing:1.5px;color:var(--text3);cursor:pointer;white-space:nowrap;min-width:80px}
#prog-label:hover{color:var(--green)}
.prog-bar-wrap{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
#prog-bar{height:100%;background:var(--green);width:0%;transition:width .4s}
#prog-pct{font-size:10px;color:var(--text4);letter-spacing:1px;width:28px;text-align:right}
#install-banner{display:none;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:10px 14px;margin:10px 14px 0;font-size:10px;color:#666;letter-spacing:1px;line-height:1.8}
#install-banner strong{color:var(--green)}
#install-banner.show{display:block}
#nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text4);padding:10px 2px;font-size:10px;letter-spacing:2px;transition:all .15s;text-transform:uppercase;cursor:pointer}
.nav-btn:hover{color:var(--text2)}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green)}
#main{flex:1;padding:12px 14px;overflow-y:auto}
.screen{display:none}
.screen.active{display:block}
.section-title{font-size:10px;letter-spacing:3px;color:var(--text4);text-transform:uppercase;padding:10px 0 8px}
.empty-msg{font-size:11px;color:#2a2a2a;letter-spacing:1px;padding:32px 0;text-align:center;line-height:2.2}
.ex-card{border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden}
.ex-card.open{border-color:var(--border2)}
.ex-header{display:flex;align-items:center;gap:8px;padding:12px;background:#0e0e0e;cursor:pointer;user-select:none}
.ex-header:active{background:var(--bg3)}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ex-name{flex:1;font-size:13px;letter-spacing:.5px;color:#ddd;font-weight:500}
.ex-meta{font-size:10px;color:var(--text4);letter-spacing:1px}
.ex-done{font-size:10px;color:#2a2a2a;letter-spacing:1px;margin-left:4px}
.ex-done.complete{color:var(--green)}
.chevron{color:var(--text4);font-size:20px;transition:transform .2s;line-height:1;transform:rotate(90deg)}
.ex-card.open .chevron{transform:rotate(-90deg)}
.ex-body{display:none;padding:4px 12px 12px;background:#0b0b0b}
.ex-card.open .ex-body{display:block}
.ex-notes{font-size:10px;color:#555;font-style:italic;line-height:1.6;padding:8px 0 6px;border-bottom:1px solid #161616;margin-bottom:8px}
.pb-banner{font-size:10px;color:var(--yellow);letter-spacing:1px;margin-bottom:8px}
.col-heads{display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:5px;margin-bottom:4px;font-size:9px;color:var(--text4);letter-spacing:2px}
.set-wrap{margin-bottom:2px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:5px;align-items:center}
.set-num{font-size:10px;color:var(--text4);text-align:center}
.set-input{background:#131313;border:1px solid #222;color:var(--text);padding:8px;font-family:'DM Mono',monospace;font-size:14px;border-radius:3px;outline:none;width:100%;transition:border-color .15s}
.set-input:focus{border-color:var(--green);background:#161616}
.set-input.is-pb{border-color:rgba(250,204,21,.3)}
.set-input::placeholder{color:#2e2e2e;font-size:11px}
.prev-hint{font-size:9px;color:#2e2e2e;padding:2px 0 4px 33px;letter-spacing:.5px}
.pb-tag{color:var(--yellow);margin-left:4px}
.remove-set-btn{background:none;border:1px solid #222;color:#444;border-radius:3px;width:28px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.remove-set-btn:hover{border-color:var(--red);color:var(--red)}
.remove-set-btn:disabled{opacity:.15;cursor:default}
.add-set-btn{width:100%;background:none;border:1px dashed #222;color:#555;padding:7px;font-size:10px;letter-spacing:2px;border-radius:3px;margin-top:8px;transition:all .15s;text-transform:uppercase;cursor:pointer}
.add-set-btn:hover{border-color:var(--green);color:var(--green)}
.prog-card{border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px;background:#0e0e0e}
.prog-card.is-active{border-color:rgba(74,222,128,.2)}
.prog-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.prog-card-name{font-size:14px;color:#ddd;margin-bottom:2px}
.prog-card-meta{font-size:10px;color:var(--text4);letter-spacing:1px}
.prog-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.active-badge{font-size:9px;color:var(--green);letter-spacing:2px;padding:2px 6px;border:1px solid rgba(74,222,128,.2);border-radius:2px}
.btn-sm{background:#141414;border:1px solid var(--border2);color:#888;font-size:9px;letter-spacing:1.5px;padding:4px 8px;border-radius:2px;transition:all .15s;cursor:pointer}
.btn-sm:hover{border-color:var(--green);color:var(--green)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.ex-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.ex-chip{font-size:9px;color:#555;padding:2px 6px;border:1px solid #222;border-radius:2px}
.add-prog-btn{width:100%;background:none;border:1px dashed var(--border2);color:#555;padding:12px;font-size:11px;letter-spacing:2px;border-radius:4px;margin-top:4px;transition:all .15s;text-transform:uppercase;cursor:pointer}
.add-prog-btn:hover{border-color:var(--green);color:var(--green)}
.field{margin-bottom:14px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
label.lbl{display:block;font-size:9px;letter-spacing:2px;color:#555;margin-bottom:5px;text-transform:uppercase}
.txt-input{width:100%;background:#141414;border:1px solid #222;color:#ddd;padding:9px 10px;font-size:12px;border-radius:3px;outline:none;transition:border-color .15s;resize:vertical}
.txt-input:focus{border-color:var(--green)}
.txt-input::placeholder{color:#2a2a2a}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-btn{background:#141414;border:1px solid #222;color:#555;font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:2px;transition:all .15s;text-transform:uppercase;cursor:pointer}
.cat-btn.active{background:#0a0a0a}
.editor-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn-primary{flex:1;background:rgba(74,222,128,.1);border:1px solid var(--green);color:var(--green);font-size:11px;letter-spacing:2px;padding:10px;border-radius:3px;transition:all .15s;cursor:pointer}
.btn-primary:hover{background:rgba(74,222,128,.2)}
.btn-primary:disabled{opacity:.3;cursor:default}
.btn-ghost{background:none;border:1px solid var(--border2);color:#555;font-size:11px;letter-spacing:2px;padding:10px 14px;border-radius:3px;transition:all .15s;cursor:pointer}
.btn-ghost:hover{border-color:#555;color:#999}
.btn-danger{background:none;border:1px solid var(--border2);color:#555;font-size:11px;letter-spacing:2px;padding:10px 12px;border-radius:3px;transition:all .15s;cursor:pointer}
.btn-danger:hover{border-color:var(--red);color:var(--red)}
.ex-editor-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0e0e0e;border:1px solid var(--border);border-radius:3px;margin-bottom:6px;cursor:pointer}
.ex-editor-row:hover{border-color:var(--border2)}
.ex-editor-info{flex:1}
.ex-editor-name{font-size:12px;color:#ccc}
.ex-editor-meta{font-size:10px;color:var(--text4);letter-spacing:1px}
.ex-editor-btns{display:flex;gap:4px}
.order-btn{background:none;border:1px solid #222;color:#555;width:26px;height:26px;border-radius:2px;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.order-btn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.order-btn:disabled{opacity:.2;cursor:default}
.sel-wrap{margin-bottom:12px}
.ll-select{width:100%;background:#141414;border:1px solid var(--border2);color:#ccc;padding:9px 10px;font-size:11px;border-radius:3px;outline:none;cursor:pointer}
.ll-select:focus{border-color:var(--green)}
.chart-card{border:1px solid var(--border);border-radius:4px;padding:14px;background:#0e0e0e}
.chart-title{font-size:12px;color:#ccc;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-pb-badge{font-size:10px;color:var(--yellow);letter-spacing:1px}
.chart-wrap{height:200px;margin-bottom:8px}
.chart-empty{font-size:10px;color:#2a2a2a;letter-spacing:1px;padding:20px 0;text-align:center}
.hist-list{border-top:1px solid #161616;padding-top:8px;margin-top:8px}
.hist-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #111}
.hist-date{font-size:10px;color:#555;flex:1}
.hist-weight{font-size:12px;color:#888;letter-spacing:1px}
.pb-card{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:4px;padding:12px 14px;background:#0e0e0e;margin-bottom:8px}
.pb-left{display:flex;align-items:center;gap:10px}
.pb-ex-name{font-size:12px;color:#ccc}
.pb-ex-date{font-size:10px;color:var(--text4);margin-top:2px}
.pb-val{display:flex;align-items:baseline;gap:3px}
.pb-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--yellow);line-height:1}
.pb-unit{font-size:10px;color:#666}
.spacer{height:48px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div class="logo">LIFT<span>LOG</span></div>
      <div class="date-wrap">
        <input type="date" id="date-input">
        <span id="saved-flash">✓</span>
      </div>
    </div>
    <div class="progress-row" id="progress-row">
      <div id="prog-label">—</div>
      <div class="prog-bar-wrap"><div id="prog-bar"></div></div>
      <div id="prog-pct">0%</div>
    </div>
  </div>
  <div id="install-banner"><strong>📱 Add to Home Screen</strong><br>iOS: tap Share → "Add to Home Screen"<br>Android: tap menu → "Add to Home Screen"</div>
  <nav id="nav">
    <button class="nav-btn active" data-screen="log">LOG</button>
    <button class="nav-btn" data-screen="programs">PROGRAMS</button>
    <button class="nav-btn" data-screen="progress">PROGRESS</button>
    <button class="nav-btn" data-screen="pbs">PBs</button>
  </nav>
  <div id="main">
    <div id="screen-log" class="screen active"></div>
    <div id="screen-programs" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-pbs" class="screen"></div>
  </div>
</div>
<script>
const STORAGE_KEY='liftlog_v3';
const CAT_COLORS={back:'#4ade80',chest:'#60a5fa',shoulders:'#f97316',arms:'#e879f9',legs:'#facc15',core:'#fb7185',other:'#94a3b8'};
const CATEGORIES=['back','chest','shoulders','arms','legs','core','other'];
const DEFAULT_PROGRAM={id:'prog_default',name:'My Program',exercises:[
  {id:'rows',name:'Barbell Rows',sets:4,reps:'8-10',notes:'Hinge ~45 deg, drive elbows back, squeeze at top',category:'back'},
  {id:'bench',name:'Bench Press',sets:4,reps:'6-8',notes:'Retract scapula, slight arch, lower to mid-chest',category:'chest'},
  {id:'shoulder',name:'Shoulder Press',sets:3,reps:'8-10',notes:'Seated or standing, full lockout overhead',category:'shoulders'},
  {id:'lat',name:'Lat Pulldown',sets:3,reps:'10-12',notes:'Lean back slightly, pull to upper chest, full stretch at top',category:'back'},
  {id:'bicep_ss',name:'Incline Bicep Curl',sets:3,reps:'10-12',notes:'SUPERSET with Tricep Pushdown - full ROM, long head stretch',category:'arms'},
  {id:'tricep_ss',name:'Tricep Pushdown',sets:3,reps:'12-15',notes:'SUPERSET with Bicep Curl - elbows pinned, full extension',category:'arms'},
  {id:'chin',name:'Banded Chin Ups',sets:3,reps:'AMRAP',notes:'Work toward unassisted. Target 6-10 reps per set',category:'back'},
]};
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
let state=(()=>{try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.programs)return s;}catch{}return{programs:[DEFAULT_PROGRAM],activeProgramId:'prog_default',logs:{},pbs:{}};})();
let currentScreen='log',currentDate=todayStr(),editingProgram=null,editingExercise=null,progressExId=null,chartInstance=null,saveTimer=null;
function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));const f=document.getElementById('saved-flash');f.classList.add('show');clearTimeout(saveTimer);saveTimer=setTimeout(()=>f.classList.remove('show'),1200);}
function activeProgram(){return state.programs.find(p=>p.id===state.activeProgramId)||state.programs[0];}
function getEntry(exId,si){return state.logs[currentDate]?.[activeProgram().id]?.[exId]?.[si]||{weight:'',reps:''};}
function setEntry(exId,si,field,value){const prog=activeProgram();if(!state.logs[currentDate])state.logs[currentDate]={};if(!state.logs[currentDate][prog.id])state.logs[currentDate][prog.id]={};if(!state.logs[currentDate][prog.id][exId])state.logs[currentDate][prog.id][exId]={};if(!state.logs[currentDate][prog.id][exId][si])state.logs[currentDate][prog.id][exId][si]={weight:'',reps:''};state.logs[currentDate][prog.id][exId][si][field]=value;if(field==='weight'&&parseFloat(value)>0){const prev=state.pbs[exId]?.weight||0;if(parseFloat(value)>parseFloat(prev)){state.pbs[exId]={weight:parseFloat(value),date:currentDate};}}persist();updateHeader();}
function getSetCount(exId){const key='__sets_'+exId;return state.logs[currentDate]?.[activeProgram().id]?.[key]??activeProgram().exercises.find(e=>e.id===exId)?.sets??3;}
function changeSetCount(exId,delta){const prog=activeProgram(),cur=getSetCount(exId),next=Math.max(1,cur+delta);if(!state.logs[currentDate])state.logs[currentDate]={};if(!state.logs[currentDate][prog.id])state.logs[currentDate][prog.id]={};if(delta<0&&state.logs[currentDate][prog.id][exId])delete state.logs[currentDate][prog.id][exId][cur-1];state.logs[currentDate][prog.id]['__sets_'+exId]=next;persist();renderLog();}
function completedSets(exId){const d=state.logs[currentDate]?.[activeProgram().id]?.[exId];if(!d)return 0;return Object.values(d).filter(s=>s&&(s.weight||s.reps)).length;}
function prevEntry(exId){const dates=Object.keys(state.logs).filter(d=>d<currentDate).sort().reverse();for(const d of dates){const e=state.logs[d]?.[activeProgram().id]?.[exId];if(e)return{date:d,entry:e};}return null;}
function updateHeader(){const prog=activeProgram();document.getElementById('prog-label').textContent=prog.name+' v';const total=prog.exercises.reduce((a,ex)=>a+completedSets(ex.id),0),possible=prog.exercises.reduce((a,ex)=>a+getSetCount(ex.id),0),pct=possible>0?Math.round(total/possible*100):0;document.getElementById('prog-bar').style.width=pct+'%';document.getElementById('prog-pct').textContent=pct+'%';document.getElementById('progress-row').style.display=currentScreen==='log'?'flex':'none';}
function showScreen(name){currentScreen=name;document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===name));document.getElementById('screen-'+name).classList.add('active');updateHeader();if(name==='log')renderLog();else if(name==='programs')renderPrograms();else if(name==='progress')renderProgress();else if(name==='pbs')renderPBs();}

function renderLog(){
  const prog=activeProgram(),container=document.getElementById('screen-log');
  if(!prog.exercises.length){container.innerHTML='<div class="empty-msg">No exercises in this program.<br>Go to PROGRAMS to add some.</div>';return;}
  container.innerHTML=prog.exercises.map(ex=>buildExCard(ex)).join('')+'<div class="spacer"></div>';
  prog.exercises.forEach(ex=>{
    const card=document.getElementById('card-'+ex.id);
    card.querySelector('.ex-header').addEventListener('click',()=>card.classList.toggle('open'));
    card.querySelector('.add-set-btn').addEventListener('click',e=>{e.stopPropagation();changeSetCount(ex.id,1);});
    const removeBtn=card.querySelector('.remove-set-btn');
    if(removeBtn)removeBtn.addEventListener('click',e=>{e.stopPropagation();changeSetCount(ex.id,-1);});
    const sc=getSetCount(ex.id);
    for(let i=0;i<sc;i++){
      const w=card.querySelector(`[data-ex="${ex.id}"][data-si="${i}"][data-field="weight"]`);
      const r=card.querySelector(`[data-ex="${ex.id}"][data-si="${i}"][data-field="reps"]`);
      if(w)w.addEventListener('input',e=>{setEntry(ex.id,i,'weight',e.target.value);const pb=state.pbs[ex.id];if(pb)w.classList.toggle('is-pb',parseFloat(e.target.value)>=pb.weight);});
      if(r)r.addEventListener('input',e=>setEntry(ex.id,i,'reps',e.target.value));
    }
  });
  updateHeader();
}

function buildExCard(ex){
  const sc=getSetCount(ex.id),done=completedSets(ex.id),pb=state.pbs[ex.id],prev=prevEntry(ex.id),color=CAT_COLORS[ex.category]||'#666';
  let sHtml='';
  for(let i=0;i<sc;i++){
    const entry=getEntry(ex.id,i),prevSet=prev?.entry?.[i],isPB=entry.weight&&pb&&parseFloat(entry.weight)>=pb.weight,isLast=i===sc-1;
    sHtml+=`<div class="set-wrap"><div class="set-row"><div class="set-num">S${i+1}</div><input class="set-input${isPB?' is-pb':''}" type="number" inputmode="decimal" step="0.5" placeholder="${prevSet?.weight||'kg'}" value="${entry.weight}" data-ex="${ex.id}" data-si="${i}" data-field="weight"><input class="set-input" type="number" inputmode="numeric" placeholder="${prevSet?.reps||'reps'}" value="${entry.reps}" data-ex="${ex.id}" data-si="${i}" data-field="reps">${isLast?`<button class="remove-set-btn"${sc<=1?' disabled':''}>&#8722;</button>`:'<div></div>'}</div>${prevSet?`<div class="prev-hint">prev ${prev.date}: ${prevSet.weight||'?'}kg x ${prevSet.reps||'?'}${isPB?'<span class="pb-tag"> *PB</span>':''}</div>`:''}</div>`;
  }
  return `<div class="ex-card" id="card-${ex.id}"><div class="ex-header"><div class="cat-dot" style="background:${color}"></div><div class="ex-name">${ex.name}</div><div class="ex-meta">${sc}x${ex.reps}</div><div class="ex-done${done>=sc?' complete':''}">${done}/${sc}</div><div class="chevron">&#8250;</div></div><div class="ex-body">${ex.notes?`<div class="ex-notes">${ex.notes}</div>`:''} ${pb?`<div class="pb-banner">* PB ${pb.weight}kg / ${pb.date}</div>`:''}<div class="col-heads"><span></span><span>KG</span><span>REPS</span><span></span></div>${sHtml}<button class="add-set-btn">+ ADD SET</button></div></div>`;
}

function renderPrograms(){
  if(editingProgram&&editingExercise){renderExerciseEditor();return;}
  if(editingProgram){renderProgramEditor();return;}
  const container=document.getElementById('screen-programs');
  container.innerHTML='<div class="section-title">MY PROGRAMS</div>'+state.programs.map(prog=>`<div class="prog-card${prog.id===state.activeProgramId?' is-active':''}"><div class="prog-card-top"><div><div class="prog-card-name">${prog.name}</div><div class="prog-card-meta">${prog.exercises.length} exercises</div></div><div class="prog-actions">${prog.id===state.activeProgramId?'<span class="active-badge">ACTIVE</span>':`<button class="btn-sm" onclick="activateProgram('${prog.id}')">USE</button>`}<button class="btn-sm" onclick="startEditProgram('${prog.id}')">EDIT</button>${state.programs.length>1?`<button class="btn-sm danger" onclick="deleteProgram('${prog.id}')">DEL</button>`:''}</div></div><div class="ex-chips">${prog.exercises.map(ex=>`<span class="ex-chip" style="border-color:${CAT_COLORS[ex.category]||'#444'}">${ex.name}</span>`).join('')}</div></div>`).join('')+'<button class="add-prog-btn" onclick="newProgram()">+ NEW PROGRAM</button><div class="spacer"></div>';
}
function activateProgram(id){state.activeProgramId=id;persist();renderPrograms();updateHeader();}
function deleteProgram(id){if(state.programs.length<=1)return;if(!confirm('Delete this program?'))return;state.programs=state.programs.filter(p=>p.id!==id);if(state.activeProgramId===id)state.activeProgramId=state.programs[0].id;persist();renderPrograms();}
function newProgram(){editingProgram={id:'prog_'+uid(),name:'New Program',exercises:[]};editingExercise=null;renderProgramEditor();}
function startEditProgram(id){editingProgram=JSON.parse(JSON.stringify(state.programs.find(p=>p.id===id)));editingExercise=null;renderProgramEditor();}

function renderProgramEditor(){
  const container=document.getElementById('screen-programs');
  const exRows=editingProgram.exercises.map((ex,i)=>`<div class="ex-editor-row" onclick="editExercise('${ex.id}')"><div class="cat-dot" style="background:${CAT_COLORS[ex.category]||'#666'}"></div><div class="ex-editor-info"><div class="ex-editor-name">${ex.name||'<span style="color:#333">Unnamed</span>'}</div><div class="ex-editor-meta">${ex.sets}x${ex.reps}</div></div><div class="ex-editor-btns" onclick="event.stopPropagation()"><button class="order-btn"${i===0?' disabled':''} onclick="reorderEx(${i},-1)">&#8593;</button><button class="order-btn"${i===editingProgram.exercises.length-1?' disabled':''} onclick="reorderEx(${i},1)">&#8595;</button></div></div>`).join('');
  container.innerHTML=`<div class="section-title">EDIT PROGRAM</div><div class="field"><label class="lbl">PROGRAM NAME</label><input class="txt-input" id="prog-name-input" value="${editingProgram.name}" placeholder="e.g. Push Day A"></div><div class="section-title" style="margin-top:8px">EXERCISES</div>${exRows}<button class="add-set-btn" onclick="newExercise()">+ ADD EXERCISE</button><div class="editor-actions"><button class="btn-primary" onclick="saveProgram()">SAVE PROGRAM</button><button class="btn-ghost" onclick="cancelEdit()">CANCEL</button></div><div class="spacer"></div>`;
  document.getElementById('prog-name-input').addEventListener('input',e=>editingProgram.name=e.target.value);
}
function reorderEx(idx,dir){const exs=editingProgram.exercises,swap=idx+dir;if(swap<0||swap>=exs.length)return;[exs[idx],exs[swap]]=[exs[swap],exs[idx]];renderProgramEditor();}
function saveProgram(){const n=document.getElementById('prog-name-input');if(n)editingProgram.name=n.value;const exists=state.programs.find(p=>p.id===editingProgram.id);if(exists)state.programs=state.programs.map(p=>p.id===editingProgram.id?editingProgram:p);else state.programs.push(editingProgram);persist();editingProgram=null;editingExercise=null;renderPrograms();updateHeader();}
function cancelEdit(){editingProgram=null;editingExercise=null;renderPrograms();}
function newExercise(){editingExercise={id:'ex_'+uid(),name:'',sets:3,reps:'8-10',notes:'',category:'other'};renderExerciseEditor();}
function editExercise(id){editingExercise=JSON.parse(JSON.stringify(editingProgram.exercises.find(e=>e.id===id)));renderExerciseEditor();}

function renderExerciseEditor(){
  const container=document.getElementById('screen-programs'),ex=editingExercise,isNew=!editingProgram.exercises.find(e=>e.id===ex.id);
  container.innerHTML=`<div class="section-title">EDIT EXERCISE</div><div class="field"><label class="lbl">NAME</label><input class="txt-input" id="ex-name" value="${ex.name}" placeholder="e.g. Bench Press"></div><div class="field-row"><div class="field"><label class="lbl">DEFAULT SETS</label><input class="txt-input" id="ex-sets" type="number" min="1" value="${ex.sets}"></div><div class="field"><label class="lbl">TARGET REPS</label><input class="txt-input" id="ex-reps" value="${ex.reps}" placeholder="8-10"></div></div><div class="field"><label class="lbl">CATEGORY</label><div class="cat-grid">${CATEGORIES.map(cat=>`<button class="cat-btn${ex.category===cat?' active':''}" style="border-color:${ex.category===cat?CAT_COLORS[cat]:'#222'};color:${ex.category===cat?CAT_COLORS[cat]:'#555'}" onclick="selectCat('${cat}')">${cat}</button>`).join('')}</div></div><div class="field"><label class="lbl">NOTES / CUES</label><textarea class="txt-input" id="ex-notes" rows="3" placeholder="Form cues...">${ex.notes}</textarea></div><div class="editor-actions"><button class="btn-primary" id="save-ex-btn" onclick="saveExercise()">SAVE</button><button class="btn-ghost" onclick="cancelExEdit()">CANCEL</button>${!isNew?`<button class="btn-danger" onclick="deleteExercise('${ex.id}')">DELETE</button>`:''}</div><div class="spacer"></div>`;
  const btn=document.getElementById('save-ex-btn');if(btn)btn.disabled=!ex.name.trim();
  document.getElementById('ex-name').addEventListener('input',e=>{editingExercise.name=e.target.value;const b=document.getElementById('save-ex-btn');if(b)b.disabled=!e.target.value.trim();});
  document.getElementById('ex-sets').addEventListener('input',e=>editingExercise.sets=parseInt(e.target.value)||1);
  document.getElementById('ex-reps').addEventListener('input',e=>editingExercise.reps=e.target.value);
  document.getElementById('ex-notes').addEventListener('input',e=>editingExercise.notes=e.target.value);
}
function selectCat(cat){editingExercise.category=cat;renderExerciseEditor();}
function saveExercise(){const n=document.getElementById('ex-name'),s=document.getElementById('ex-sets'),r=document.getElementById('ex-reps'),nt=document.getElementById('ex-notes');if(n)editingExercise.name=n.value;if(s)editingExercise.sets=parseInt(s.value)||editingExercise.sets;if(r)editingExercise.reps=r.value;if(nt)editingExercise.notes=nt.value;const exists=editingProgram.exercises.find(e=>e.id===editingExercise.id);if(exists)editingProgram.exercises=editingProgram.exercises.map(e=>e.id===editingExercise.id?editingExercise:e);else editingProgram.exercises.push(editingExercise);editingExercise=null;renderProgramEditor();}
function cancelExEdit(){editingExercise=null;renderProgramEditor();}
function deleteExercise(id){editingProgram.exercises=editingProgram.exercises.filter(e=>e.id!==id);editingExercise=null;renderProgramEditor();}

function allExercises(){const seen=new Set(),out=[];state.programs.forEach(prog=>prog.exercises.forEach(ex=>{if(!seen.has(ex.id)){seen.add(ex.id);out.push({...ex,progName:prog.name});}}));return out;}
function getChartData(exId){const points=[];Object.entries(state.logs).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,programs])=>{Object.values(programs).forEach(exercises=>{const d=exercises[exId];if(!d)return;const sets=Object.values(d).filter(s=>s&&s.weight);if(!sets.length)return;const maxW=Math.max(...sets.map(s=>parseFloat(s.weight)||0));if(maxW>0&&!points.find(p=>p.full===date))points.push({date:date.slice(5),full:date,weight:maxW});});});return points;}

function renderProgress(){
  const container=document.getElementById('screen-progress'),exercises=allExercises();
  if(!exercises.length){container.innerHTML='<div class="section-title">PROGRESS</div><div class="empty-msg">No exercises yet.</div>';return;}
  if(!progressExId)progressExId=exercises[0].id;
  const opts=exercises.map(ex=>`<option value="${ex.id}"${ex.id===progressExId?' selected':''}>${ex.name}</option>`).join('');
  container.innerHTML=`<div class="section-title">PROGRESS</div><div class="sel-wrap"><select class="ll-select" id="progress-select">${opts}</select></div><div class="chart-card"><div class="chart-title" id="chart-title"></div><div class="chart-wrap"><canvas id="progress-chart"></canvas></div><div id="chart-empty" class="chart-empty" style="display:none">Log at least 2 sessions to see a chart.</div><div class="hist-list" id="hist-list"></div></div><div class="spacer"></div>`;
  document.getElementById('progress-select').addEventListener('change',e=>{progressExId=e.target.value;drawChart();});
  drawChart();
}

function drawChart(){
  const ex=allExercises().find(e=>e.id===progressExId);if(!ex)return;
  const data=getChartData(progressExId),pb=state.pbs[progressExId],color=CAT_COLORS[ex.category]||'#4ade80';
  document.getElementById('chart-title').innerHTML=`<span style="color:${color}">&#9679;</span>${ex.name}${pb?`<span class="chart-pb-badge"> * ${pb.weight}kg</span>`:''}`;
  const canvas=document.getElementById('progress-chart'),emptyDiv=document.getElementById('chart-empty');
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  if(data.length<2){canvas.style.display='none';emptyDiv.style.display='block';}
  else{canvas.style.display='block';emptyDiv.style.display='none';
    chartInstance=new Chart(canvas,{type:'line',data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d.weight),borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:4,pointBackgroundColor:color,tension:.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#111',borderColor:'#2a2a2a',borderWidth:1,titleColor:'#666',bodyColor:color,callbacks:{label:ctx=>ctx.parsed.y+' kg'}}},scales:{x:{grid:{color:'#111'},ticks:{color:'#555',font:{size:10}}},y:{grid:{color:'#111'},ticks:{color:'#555',font:{size:10}}}},animation:{duration:400}}});}
  const hist=document.getElementById('hist-list');
  hist.innerHTML=data.slice().reverse().slice(0,10).map(d=>`<div class="hist-row"><span class="hist-date">${d.full}</span><span class="hist-weight">${d.weight} kg</span>${d.weight===pb?.weight?'<span class="pb-tag">*PB</span>':''}</div>`).join('')||'<div class="chart-empty">No data yet.</div>';
}

function renderPBs(){
  const container=document.getElementById('screen-pbs'),exercises=allExercises();
  const items=exercises.filter(ex=>state.pbs[ex.id]).map(ex=>{const pb=state.pbs[ex.id],color=CAT_COLORS[ex.category]||'#666';return`<div class="pb-card"><div class="pb-left"><div class="cat-dot" style="background:${color}"></div><div><div class="pb-ex-name">${ex.name}</div><div class="pb-ex-date">${pb.date}</div></div></div><div class="pb-val"><span class="pb-num">${pb.weight}</span><span class="pb-unit">kg</span></div></div>`;}).join('');
  container.innerHTML='<div class="section-title">PERSONAL BESTS</div>'+(items||'<div class="empty-msg">No PBs yet - start logging!</div>')+'<div class="spacer"></div>';
}

// Init
document.getElementById('date-input').value=currentDate;
document.getElementById('date-input').addEventListener('change',e=>{currentDate=e.target.value;if(currentScreen==='log')renderLog();updateHeader();});
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{editingProgram=null;editingExercise=null;showScreen(btn.dataset.screen);}));
document.getElementById('prog-label').addEventListener('click',()=>{editingProgram=null;editingExercise=null;showScreen('programs');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen==='programs'));});
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent),isAndroid=/android/i.test(navigator.userAgent);
if((isIOS||isAndroid)&&!window.navigator.standalone&&!window.matchMedia('(display-mode:standalone)').matches)document.getElementById('install-banner').classList.add('show');
updateHeader();renderLog();
// Unregister any existing service workers that may be causing issues
if('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}
</script>
</body>
</html>
